      mandatory_boundary_tests:
        - "qwen-thinking shape, mean retrieval_calls = 1.49 → expect bonus = -0.05"
        - "qwen-thinking shape, mean retrieval_calls = 1.50 → expect bonus = 0.00"
        - "qwen-thinking shape, mean retrieval_calls = 1.99 → expect bonus = 0.00"
        - "qwen-thinking shape, mean retrieval_calls = 2.00 → expect bonus = +0.05"
        - "qwen-thinking shape, mean retrieval_calls = 2.50 → expect bonus = +0.05"
      mandatory_routing_tests:
        - "claude shape: bonus computation NOT applied (excluded from retrieval engagement weighting)"
        - "gpt shape: bonus computation NOT applied"
        - "generic-simple shape: bonus computation NOT applied"
        - "qwen-thinking shape: bonus computation IS applied"
        - "qwen-non-thinking shape: bonus computation IS applied"
      mandatory_acceptance_tests:
