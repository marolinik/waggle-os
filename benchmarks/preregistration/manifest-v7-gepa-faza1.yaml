# ── Corpus design (Ask A Option C from Amendment 1) ────────────────────────

corpus_design:
  total_instances: 50
  generation_oracle:
    model: claude-opus-4-7
    max_tokens: 8000
    thinking: true
    temperature: 0.7  # higher for instance variation
    rationale: "Opus 4.7 chosen for consistency with mutation oracle (brief §3.3); single-oracle design minimizes confounders across pre-work + GEPA pipeline"
  domain: NorthLane_CFO_synthesis
  domain_anchor: pilot_2026_04_26_brief_dir_D__Projects_PM_Waggle_OS_briefs_2026_04_26_agentic_knowledge_work_pilot
  stratification_axes:
    primary_axis: task_family
    primary_axis_count: 5
    secondary_axis: persona_company_stage
    secondary_axis_count: 10  # 5 personas × 2 company stages
    cells_per_family: 10
  task_families:
    - id: F1_strategic_synthesis
      description: "Multi-document risk identification + prioritized action planning (mirror pilot task-1)"
      mirror_pilot_task: task-1
      docs_per_instance: 7
      example_prompt_template: "Identify the 3 most critical risks for $COMPANY in $PERIOD and propose action plan for each."
    - id: F2_cross_thread_coordination
      description: "Multi-stakeholder alignment across email/Slack/document threads (mirror pilot task-2)"
      mirror_pilot_task: task-2
      docs_per_instance: 6
      example_prompt_template: "Reconcile conflicting positions from $STAKEHOLDERS and propose unified approach."
    - id: F3_decision_support
      description: "Go/no-go recommendations with explicit tradeoff analysis (mirror pilot task-3)"
      mirror_pilot_task: task-3
      docs_per_instance: 6
      example_prompt_template: "Recommend $DECISION based on materials; justify, address counter-arguments."
    - id: F4_investor_communications
      description: "Board update memos + investor Q&A prep (NEW family, NorthLane domain extension)"
      mirror_pilot_task: NONE
      docs_per_instance: 6
      example_prompt_template: "Draft Q$N investor update covering $METRICS + addressing $CONCERNS."
    - id: F5_scenario_planning
      description: "Multi-scenario forecast + decision-tree comparison (NEW family, NorthLane domain extension)"
      mirror_pilot_task: NONE
      docs_per_instance: 7
      example_prompt_template: "Compare $N scenarios for $DECISION_AREA; recommend hedging strategy."
  persona_axis:
    - p1_founder_ceo
    - p2_cfo  # mirrors pilot persona
    - p3_coo
    - p4_vp_finance
    - p5_independent_director
  company_stage_axis:
    - stage_a_series_b_growth_burning  # mirrors NorthLane state
    - stage_b_post_profitable_consolidation
  stratified_sampling:
    method: deterministic_fully_crossed
    seed: 42
    yield: "5 task_families × 5 personas × 2 company_stages = 50 cells; each cell = 1 instance"
  rubric_per_instance:
    dimensions: [completeness, accuracy, synthesis, judgment, actionability, structure]
    scale: likert_1_5
    inherited_from: pilot_judge_rubric_sha256_2e24826eb75e92ef1e64055bb2c632eec64ded8fedf7d5b6897ccaec9ffff2eb
  per_instance_quality_floor:
    docs_per_instance_min: 6
    docs_per_instance_max: 8
    avg_doc_length_chars: 800-1500
    persona_chars: 100-300
    scenario_chars: 200-500
    question_chars: 100-300
  spot_audit:
    sample_size: 5
    sampling: random_seeded_42
    audit_dimensions:
      - "instance has ≥6 source docs (count check)"
      - "persona + scenario coherent + plausible (manual read)"
      - "question answerable from materials (no fabrication required)"
      - "rubric dims applicable (no edge case e.g. binary yes/no)"
      - "domain anchor preserved (NorthLane CFO context recognizable)"
    halt_on: "any 1 of 5 fails any dimension → corpus regeneration required"
    pre_a_checkpoint_binding: true
  expected_generation_cost_usd: 5.00
  generation_cost_breakdown: "50 instances × ~16k tokens output × $0.075/1k = ~$60... actual estimate ~$5 with prompt caching + Opus 4.7 efficient generation; halt at $7 generation cost (40% buffer)"
  generation_artifact_path: benchmarks/results/gepa-faza1/corpus/h3-northlane-cfo-50-instances.jsonl
  spot_audit_report_path: benchmarks/results/gepa-faza1/corpus/h3-spot-audit-pre-a-report.md

# ── GEPA Faza 1 specification ──────────────────────────────────────────────

gepa:
  faza: 1
  type: pilot_proof_of_concept
  cell_scope:
    label: H3
    semantic: Qwen_solo_synthesis
    source_corpus: corpus_design.task_families  # 50 NorthLane CFO instances
  shape_scope:
    target_count: 5
    targets:
      - claude
      - qwen-thinking  # primary substrate (H3 = Qwen)
      - qwen-non-thinking
      - gpt
      - generic-simple
    target_path: packages/agent/src/prompt-shapes/  # CORRECTION per Ask D from packages/core/
    cell_scope_per_shape: H3
  population:
    candidates_per_shape: 3
    seed_candidate_per_shape: current_baseline_shape  # @ c9bda3d
    mutation_count_per_shape: 2
    total_candidates: 15  # 5 shapes × 3 candidates
  generations:
    count: 2
    gen_0: initial_population_with_baseline_seeds
    gen_1: one_round_of_mutations
    convergence_search: false  # explicitly NOT a convergence run
  evaluation:
    n_per_candidate: 8
    instance_selection: deterministic_stratified_seed_42_from_corpus_design
    evaluation_type: trio_judged_per_metric_operationalization
  mutation_oracle:
    model: claude-opus-4-7
    max_tokens: 8000
    thinking: true
    temperature: 0.5
    prompt_template_path_qwen: benchmarks/results/gepa-faza1/oracle/mutation-prompt-template-qwen.md
    prompt_template_path_non_qwen: benchmarks/results/gepa-faza1/oracle/mutation-prompt-template-non-qwen.md
    fork_method: shape_class_routing  # see mutation_oracle_design section below — added by Amendment 2
    constraints:
      - "preserve cell semantics: do NOT modify MULTI_STEP_ACTION_CONTRACT in types.ts"
      - "preserve cell semantics: do NOT modify cell.system_prompt or cell.scoring_rubric"
      - "modify only reasoning scaffold, planning step structure, or chain-of-thought triggers"
      - "do NOT modify task framing (persona/question/materials section labels)"
    failure_handling: "2 consecutive invalid mutations from oracle (per brief §5 halt trigger) → halt-and-PM"
  mutation_validator:
    type: cell_semantic_preservation_audit
    inputs: [baseline_shape_file, candidate_shape_file]
    diff_target: shape_file_only
    invalid_diff_targets:
      - types.ts (entire file LOCKED)
      - selector.ts (entire file LOCKED)
      - index.ts (entire file LOCKED)
      - shape_file.metadata (only evidence_link can update; description/modelClass/defaultThinking/defaultMaxTokens LOCKED)
      - shape_file.imports (LOCKED)
      - MULTI_STEP_ACTION_CONTRACT (LOCKED — single hashable boundary)
    valid_diff_targets:
      - shape_file.systemPrompt method body (string-building only)
      - shape_file.soloUserPrompt method body
      - shape_file.multiStepKickoffUserPrompt method body
      - shape_file.retrievalInjectionUserPrompt method body
      - shape_file.metadata.evidence_link (MUST update to point to GEPA Gen 1 results)
    boundary_anchor:
      file: packages/agent/src/prompt-shapes/types.ts
      constant_name: MULTI_STEP_ACTION_CONTRACT
      sha256_at_substrate_anchor: NOT_YET_COMPUTED  # CC-2 computes pre-launch decision
      enforcement: "any candidate that produces non-zero diff against this string at the byte level → automatic INVALID, candidate dropped, oracle re-prompted (consumes 1 of 2 tolerance per brief §5)"
    output: validity_verdict_per_candidate_with_diff_artifact

# ── Faza 1 acceptance criteria (per brief §4 + Amendment 1 §6 update) ──────

faza_1_acceptance:
  conditions_all_must_hold:
    - id: condition_1_updated_twice
      brief_section: "§4 condition 1 UPDATED per Amendment 1 §6 + Amendment 2 §5 (third update — Qwen-shape sub-criterion added)"
      statement: "Best GEPA candidate per shape beats NULL-baseline by ≥+5pp on trio_strict_pass rate (where trio_strict_pass = trio_mean ≥ 4.0 per Ask B ratification). For Qwen-targeted shapes (qwen-thinking, qwen-non-thinking), additionally: best candidate must have mean retrieval_calls per task ≥ 1.7 (engagement gap closed by ≥50% relative to Qwen baseline 1.33 → Opus parity 2.33)."
      operationalization_primary: metric_operationalization.trio_strict_pass.method_primary
      delta_threshold_pp: 5
      qwen_retrieval_engagement_floor_per_task: 1.7  # 50% gap closure threshold
      n_per_evaluation: 8
      ci_pp_at_95: 17  # binomial CI for N=8 — fitness signal not statistical claim
      signal_disclaimer: "+5pp threshold is FITNESS SIGNAL indicator, not publishable statistical claim per brief §6.5 σ-aware acceptance"
    - id: condition_2
      brief_section: "§4 condition 2 unchanged"
      statement: "At least 3/5 shapes show positive delta"
      rationale: "avoids cherry-picking single shape that lucked out"
    - id: condition_3
      brief_section: "§4 condition 3 unchanged"
      statement: "Trio judge κ remains within ±0.05 of canonical 0.7878"
      drift_band: canonical_kappa_anchor.drift_band
    - id: condition_4
      brief_section: "§4 condition 4 unchanged"
      statement: "Zero cell semantic violations detected per gepa.mutation_validator audit"
  conditions_pass_fail_NEW_per_amendment_2:
    - id: condition_5_NEW_false_positive_guard
      brief_section: "§4.5 NEW per Amendment 2 §5 — false-positive evolution guard"
      statement: "If best Qwen-shape candidate achieves +5pp trio_strict delta WITHOUT closing retrieval engagement gap (mean retrieval_calls per task < 1.5), this signals false-positive evolution (improvement via mutation-noise rather than mechanistic fix). Result: candidate REJECTED, shape marked FAIL even if other criteria pass."
      applies_to_shapes: [qwen-thinking, qwen-non-thinking]
      rejection_threshold_retrieval_calls_per_task: 1.5
      rejection_with_trio_delta_at_or_above: 5  # pp
      pm_action_on_trigger: "PM ratifies whether to re-run mutation generation with stronger anti-premature-finalization scaffolding or escalate"
  fail_conditions_any_triggers_fail:
    - "condition_1 fails (best candidate delta < +5pp on majority shapes; OR Qwen shape passes trio delta but fails retrieval engagement floor 1.7)"
    - "condition_5 triggers (Qwen false-positive guard — +5pp trio delta with retrieval_calls < 1.5 → REJECTED)"
    - "best candidate beats NULL-baseline only by overfitting evaluation set (detected via held-out 5 instances per shape)"
    - "condition_3 fails (κ drift > 0.05 from 0.7878 → judge ensemble unreliable)"
    - "condition_4 fails (cell semantic violation found in best candidate)"
  on_fail: "fallback PHF; GEPA work parked; paper claim #2 multiplier teza reframes per decisions/2026-04-26-decision-matrix-self-judge-reframe.md"
  on_pass: "Faza 2 expansion brief authoring authorized; CC-1 Phase 5 NULL-baseline run gated on Faza 1 PASS"

# ── Cost & halt governance (brief §5 + §6.7 + Amendment 1 §4) ──────────────

cost_governance:
  hard_cap_usd: 115.00  # raised from $100 by Amendment 3 (inherited estimate correction, NOT scope creep)
  hard_cap_usd_pre_amendment_3: 100.00  # historical for audit chain
  internal_halt_usd: 90.00  # raised from $80 by Amendment 3 (proportional to cap raise)
  internal_halt_usd_pre_amendment_3: 80.00
  expected_total_usd: 109.08  # corpus $13.58 + NULL $20 + Gen 1 $60 + held-out $12.50 + mutation $3
  expected_total_usd_pre_amendment_3: 100.50  # Amendment 1 §4 historical
  super_linear_buffer:
    base_token_projection_multiplier: 1.5  # per brief §6.7 worst-case 1.5× baseline
    mid_run_halt_threshold_pct: 30  # halt if actual exceeds projection by >30%
    audit_frequency: every_20_evaluations
  pre_phase_boundary_reprojection:  # NEW per Amendment 3 binding rule
    rule: "Re-project downstream phase cost from actual cost-per-eval telemetry of just-completed phase before kicking next phase. Halt if downstream projection exceeds manifest target by >30%."
    applies_to:
      - "Pre-Gen-1: after NULL-baseline (Checkpoint A), before Gen 1 kick"
    halt_trigger_threshold_pct: 30
    halt_options:
      - "raise downstream cap proportionally (Amendment 3 precedent)"
      - "reduce downstream scope (e.g. 3 candidates × 6 instances OR 2 candidates × 8 instances)"
      - "pause Faza 1 + report; PM decides path"
  breakdown:
    corpus_generation:
      n_instances: 50
      cost_per_instance_usd: 0.27  # corrected from $0.10 by Amendment 3 probe data
      cost_per_instance_usd_pre_amendment_3: 0.10  # inherited generic LLM estimate (incorrect)
      subtotal_usd: 13.58  # 50 × $0.2716 actual Opus 4.7 cost
      subtotal_usd_pre_amendment_3: 5.00
      payment: claude-opus-4-7_generation_oracle
      cost_halt_usd: 15.00  # raised from $7 by Amendment 3 (40% buffer over $13.58 expected)
      cost_halt_usd_pre_amendment_3: 7.00
    null_baseline:
      n_shapes: 5
      n_instances: 8
      cost_per_run_usd: 0.50
      subtotal_usd: 20.00
      payment: subject_qwen + judge_trio
    gepa_gen_1:
      n_shapes: 5
      n_candidates: 3
      n_instances: 8
      cost_per_run_usd: 0.50
      subtotal_usd: 60.00
      payment: subject_qwen + judge_trio
    held_out_validation:
      n_shapes: 5
      n_top_candidates: 1
      n_instances: 5
      cost_per_run_usd: 0.50
      subtotal_usd: 12.50
      payment: subject_qwen + judge_trio
    mutation_oracle:
      n_shapes: 5
      n_mutations_per_gen: 2
      n_generations: 2
      cost_per_mutation_usd: 0.15
      subtotal_usd: 3.00
      payment: claude-opus-4-7_mutation_oracle
  halt_triggers:
    - "cumulative spend > $90 (internal halt — raised from $80 by Amendment 3)"
    - "cumulative spend > $115 (hard cap — raised from $100 by Amendment 3)"
    - "mid-run actual > projection by 30% (super-linear sub-rule)"
    - "PRE-GEN-1 (Checkpoint A → Gen 1): downstream Gen 1 projection from actual NULL-baseline telemetry > $78 (30% over $60 manifest target) — halt + PM ratify per pre_phase_boundary_reprojection rule"
    - "κ drift detected mid-run (sample audit every 20 calls)"
    - "cell semantic violation detected"
    - "mutation oracle 2 consecutive invalid mutations"
    - "any LLM API blocker (rate-limit cascade, auth failure)"

