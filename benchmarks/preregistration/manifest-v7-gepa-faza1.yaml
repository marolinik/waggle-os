        status: PASS  # documented in §probe_verdict above
      - id: registerShape_implemented
        status: PASS  # selector.ts (worktree) + selector.ts (main repo mirror)
      - id: registerShape_re_exported
        status: PASS  # prompt-shapes/index.ts + index.ts in BOTH worktree + main repo
      - id: regression_test_green
        status: PASS  # 7/7 tests in registry-injection.test.ts
      - id: full_faza_1_test_suite_green
        status: PASS  # 206/206 tests across 10 test files (was 199; +7 from regression test)
      - id: runner_dry_run_green
        status: PASS  # all 5 baselines + 10 mutations load + register + dry-run candidate enumeration completes
      - id: sunk_evals_archived
        status: PENDING_THIS_COMMIT  # archive action defined in §sunk_disposition; will land in same commit as Amendment 8
    cost_projection_fresh_gen_1: 4.96  # full 30 evals × $0.124/eval = $3.72 + judge variance buffer + retry overhead
    cumulative_post_fresh_gen_1_partial_projection_usd: 31.50  # 26.54 sunk + 4.96 fresh
    headroom_under_115_cap_usd: 83.50

  mid_run_halt_thresholds_unchanged:
    note: "Amendment 7 §checkpoint_b_tightened mid-run halt thresholds remain ACTIVE for fresh Gen 1 run. Per PM brief step 5: 'If qwen_retrieval_engagement triggers AGAIN on fresh run (post-fix, with mutations actually executing), THAT is a real signal — escalate to Option C investigate even mid-run.'"
    interpretation: "Pre-fix halt was variance-driven (mutations didn't execute). Post-fix halt would mean evolution genuinely makes retrieval WORSE — opposite Phase 4.5 signal direction → mechanistic regression deserving immediate investigation, not auto-recovery."

  cross_references:
    pm_brief_session_authored_at: "Session start 2026-04-28 (PM RATIFY brief §1-§8 + later Probe-first + Option B ratify)"
    investigate_report: benchmarks/results/gepa-faza1/gen-1/investigate-report.md
