# ── Judge metric design (Amendment 5 §judge_metric_design — BINDING) ───────

judge_metric_design:
  added_by: amendment_5
  primary_metric_for_synthesis_likert:
    name: pairwise_raw_agreement_rate
    method: "binary derived from per-judge mean ≥ trio_strict_threshold (default 4.0 per Ask B); count fraction where each pair agrees on pass/fail; report all 3 pairs + min"
    drift_band_raw_agreement_min_pct: 65  # min raw agreement across pairs must be ≥ 65%
    rationale: "Robust to high-base-rate skew; directly interpretable as 'how often do judges agree pass-vs-fail'; matches PM intent of §F.3 ('validate ensemble didn't drift mid-run')"
  audit_reference_metric:
    name: cohens_kappa_pairwise
    method: "standard Cohen 1960 κ on same binary"
    cohen_paradox_note: "high-base-rate paradox per Feinstein & Cicchetti 1990 — when both raters near-uniformly say PASS (e.g. 90%), expected chance agreement is ~85%, so observed - expected → small or negative κ even with high raw agreement"
    canonical_value_with_caveat:
      value: 0.7878
      measured_on: "LoCoMo factoid binary correctness with balanced base rate (~50% pass per cell)"
      not_directly_comparable_to: "synthesis Likert binarized at trio_mean ≥ 4.0 (Faza 1 ~88% base rate)"
      use_for: audit_reference_only
  drift_decision_rule_synthesis_likert:
    primary: "raw agreement min(pair) ≥ 65% → PASS"
    secondary: "report literal κ values for audit chain; flag if ≥ 2 pairs simultaneously go below 50% raw agreement (genuine ensemble drift signal)"
    pm_verdict: "primary PER CHECKPOINT with full context; no automatic verdict from κ alone"
  parallel_report_format:
    columns:
      - pair: opus_gpt
        raw_agreement_pct: "<computed>"
        cohens_kappa: "<computed>"
      - pair: opus_minimax
        raw_agreement_pct: "<computed>"
        cohens_kappa: "<computed>"
      - pair: gpt_minimax
        raw_agreement_pct: "<computed>"
        cohens_kappa: "<computed>"
    aggregates:
      - min_raw_agreement_pct: "<min across pairs>"
      - min_cohens_kappa: "<conservative trio>"
  faza_1_null_baseline_results_at_amendment_5:
    raw_agreement:
      opus_gpt_pct: 75.0
      opus_minimax_pct: 80.0
      gpt_minimax_pct: 70.0
      min_pct: 70.0
      verdict: PASS  # 70% ≥ 65% threshold
    kappa:
      opus_gpt: 0.342
      opus_minimax: -0.111
      gpt_minimax: 0.211
      min: -0.111
      audit_note: "Cohen high-base-rate paradox; literal verdict DRIFT_LOW would be misleading; raw agreement primary verdict PASS"
    pass_rates_at_threshold_4_0:
      opus_pct: 90.0
      gpt_pct: 65.0
      minimax_pct: 90.0

