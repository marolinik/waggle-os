    cells_retried:
      - h3-F4-p2_cfo-stage_a_series_b_growth_burning-001
      - h3-F4-p2_cfo-stage_b_post_profitable_consolidation-001
      - h3-F5-p1_founder_ceo-stage_a_series_b_growth_burning-001
    failure_class: "Opus 4.7 emitted unescaped quotation marks inside long doc-body strings, breaking JSON envelope at positions 7042 / 7821 / 8823 in original generation"
    mitigation:
      response_format: '{"type":"json_object"}'
      max_tokens: 6000  # reduced from 8000 to constrain output volume
      temperature: omitted  # Anthropic Opus 4.7 deprecates temperature when response_format set; matches GPT-5.4/MiniMax pilot precedent
