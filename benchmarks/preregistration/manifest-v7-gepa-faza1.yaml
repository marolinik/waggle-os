    - "Phase 5 inheritance: Phase 5 GEPA-evolved variant uses Faza 1 corpus as baseline; cleaner 50/50 corpus = cleaner Phase 5 measurement + fewer methodological caveats in paper §5.4"
    - "JSON-mode mitigation pattern documentation: reusable insurance for Faza 2 expansion + Phase 5 GEPA-evolved variant if same failure class recurs"
