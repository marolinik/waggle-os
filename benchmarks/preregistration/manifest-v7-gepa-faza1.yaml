# ── Metric operationalization (Ask B from Amendment 1) ─────────────────────

metric_operationalization:
  trio_strict_pass:
    method_primary: aggregate_trio_mean_threshold
    method_primary_id: "(ii)"
    threshold_primary: 4.0
    citation: "Amendment 1 Ask B ratification (trio_mean ≥ 4.0 per pilot artifact pattern interpretation)"
    method_supplementary: per_judge_mean_threshold_with_quorum
    method_supplementary_id: "(i)"
    threshold_supplementary_per_judge: 3.5
    threshold_supplementary_quorum: "≥ 2 of 3 judges with mean ≥ 3.5"
    citation_supplementary: "pilot 2026-04-26 runner SHA 8a6251e2 line 657 actually-deployed code"
    discrepancy_note:
      detected: true
      summary: "Amendment 1 Ask B specifies that operationalization (ii) reuses 'pilot 2026-04-26 already-deployed pattern'. Pre-flight discovery during runner archeology found the deployed code uses (i), not (ii). Both happen to agree on the pilot's 12 sample data points but can diverge for candidates near boundary."
      resolution: "Faza 1 computes BOTH methods for every evaluation, reports both in raw judge logs + summary. Acceptance per brief §4 condition 1 (Amendment 1 §6 update) uses (ii) trio_mean ≥ 4.0 as PRIMARY. (i) reported as supplementary diagnostic for cross-checking against pilot baseline."
      pm_visibility: "Reported at Pre-A halt + Checkpoint A + Checkpoint C; PM may override to (i) primary if cross-method delta exceeds ±2pp on NULL-baseline."
  trio_critical_fail:
    method: per_judge_mean_threshold_with_quorum
    threshold_per_judge: 2.0
    threshold_quorum: "≥ 2 of 3 judges with mean < 2.0 AND > 0 (excludes failed parses)"
    citation: "pilot 2026-04-26 runner SHA 8a6251e2 line 658"
    inheritance: unchanged_from_pilot
  trio_mean:
    method: arithmetic_mean_of_valid_judge_means
    valid_judge_means_filter: "judge.mean > 0 (excludes failed parse / 2-of-2 quorum fallback per v6 §5.2.1)"
    fallback: "If all 3 judges fail: trio_mean = 0, flagged as evaluator_loss per v6 §9"
  retrieval_engagement_bonus:
    added_by: amendment_2
    rationale: "Phase 4.5 empirical signal — Qwen retrieves 1.33×/task vs Opus 2.33×/task on byte-identical MULTI_STEP_ACTION_CONTRACT surface; H4 score gap mechanistically traces to under-engagement, not tool format"
    applies_to_shapes: [qwen-thinking, qwen-non-thinking]
    excluded_shapes: [claude, gpt, generic-simple]  # exclusion rationale: these don't exhibit the engagement gap
    metric: mean_retrieval_calls_per_task
    bands:
      bonus_plus_5pp: ">= 2.0"   # Opus parity proxy
      bonus_zero: "[1.5, 2.0)"
      bonus_minus_5pp: "< 1.5"   # Qwen baseline behavior penalty
    encoded_as_decimals:
      "+0.05": ">= 2.0"
      "0.00": "[1.5, 2.0)"
      "-0.05": "< 1.5"
    threshold_choice_rationale:
      width_5pp: "matches brief §4 condition 1 +5pp threshold for signal magnitude consistency"
      threshold_2_0: "Opus mean 2.33 is parity target; 2.0 = slight relaxation acknowledging Faza 1 shapes are mid-evolution; achievement signals engagement gap closed to within 14% of Opus"
      threshold_1_5: "midpoint between Qwen baseline 1.33 and Opus parity 2.33; below this = Qwen baseline behavior unimproved"
    telemetry_source: agent_harness_existing_retrieval_calls_counter  # no new API calls per Amendment 2 §7
    pilot_anchor_data:
      qwen_baseline: "1.33 mean (Cells D across task-{1,2,3})"
      opus_baseline: "2.33 mean (Cells B across task-{1,2,3})"
      gap_pp: 43  # Qwen under-engagement vs Opus
      source: pilot-2026-04-26 + Phase 4.5 audit decisions/2026-04-28-phase-4-5-tools-audit-results.md
  per_shape_fitness_formula:
    qwen_targeted:
      shapes: [qwen-thinking, qwen-non-thinking]
      formula: "trio_strict_pass_rate + retrieval_engagement_bonus - cost_penalty"
    non_qwen:
      shapes: [claude, gpt, generic-simple]
      formula: "trio_strict_pass_rate - cost_penalty"
    cost_penalty:
      method: linear_per_dollar_above_baseline_median
      coefficient_pp_per_dollar_10c: 0.5  # -0.5pp per $0.10 above per-shape baseline median
      baseline_reference: per_shape_null_baseline_median_cost_usd

