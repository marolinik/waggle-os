      delta_pp: 43  # Qwen under-engagement vs Opus
      qwen_trio_mean_avg: 4.30  # Cells D mean
      opus_trio_mean_avg: 4.94  # Cells B mean
      delta_score_avg: -0.65  # Qwen below Opus on every task
