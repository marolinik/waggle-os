# ── Mutation oracle design (Amendment 2 §4 — forked Qwen vs non-Qwen) ──────

mutation_oracle_design:
  added_by: amendment_2
  rationale: "Phase 4.5 finding requires Qwen-specific scaffolding to address mechanistic under-engagement; uniform mutation guidance would not target the empirical gap; forked oracle prompts ensure Qwen mutations explore the engagement-bonus reward landscape while non-Qwen mutations explore the broader scaffold space"
  fork_routing:
    method: shape_class_string_match
    qwen_targeted_shapes: [qwen-thinking, qwen-non-thinking]
    non_qwen_shapes: [claude, gpt, generic-simple]
  qwen_prompt_template:
    path: benchmarks/results/gepa-faza1/oracle/mutation-prompt-template-qwen.md
    additional_guidance:
      - "Emphasize multi-turn retrieval over single-shot retrieval"
      - "Discourage premature finalization. Example phrasing: 'Continue retrieving until you have evidence from at least 2 distinct queries before finalizing'"
      - "Encourage iterative refinement of retrieval queries based on prior turn results"
      - "Anti-premature-finalization scaffolding. Example: 'Before finalizing, ask: what gap in evidence remains? Issue another retrieval if any gap exists.'"
      - "Preserve cell semantic boundary (per Amendment 1 §6.4 mutation validator) — DO NOT modify MULTI_STEP_ACTION_CONTRACT bytes"
    standard_constraints_inherited: gepa.mutation_oracle.constraints
  non_qwen_prompt_template:
    path: benchmarks/results/gepa-faza1/oracle/mutation-prompt-template-non-qwen.md
    additional_guidance: "standard mutation guidance per original brief §3.3 — no Qwen-specific scaffolding (these shapes do not exhibit the engagement gap per Phase 4.5 audit)"
    standard_constraints_inherited: gepa.mutation_oracle.constraints
  fork_validation:
    test: "shape-routing test in scaffold tests must verify oracle template selection per shape class"
    coverage: "Qwen branch: 2 shapes × at least 1 test each; non-Qwen branch: 3 shapes × at least 1 test each"

