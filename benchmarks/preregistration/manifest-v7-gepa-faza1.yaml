    retry_outcome: 3_of_3_succeeded
    retry_latency_each_seconds: ~64
    notes:
      - "First retry attempt failed with `temperature is deprecated for this model` Anthropic API error when temperature=0.3 was sent alongside response_format. Mitigation: omit temperature when JSON-mode requested. Discovery + fix landed mid-retry."
