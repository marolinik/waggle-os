model_list:
  # ── Anthropic ──────────────────────────────────────────────────
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6-20250610
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # Legacy aliases (backwards compat)
  - model_name: claude-3-5-sonnet-20241022
    litellm_params:
      model: anthropic/claude-sonnet-4-6-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: anthropic/claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: anthropic/claude-opus-4.6
    litellm_params:
      model: anthropic/claude-opus-4-6-20250610
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── OpenAI ─────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o3
    litellm_params:
      model: openai/o3
      api_key: os.environ/OPENAI_API_KEY

  # ── Google Gemini ──────────────────────────────────────────────
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-preview-06-05
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash-preview-05-20
      api_key: os.environ/GEMINI_API_KEY

  # ── xAI (Grok) ────────────────────────────────────────────────
  - model_name: grok-3
    litellm_params:
      model: xai/grok-3
      api_key: os.environ/XAI_API_KEY

  - model_name: grok-3-mini
    litellm_params:
      model: xai/grok-3-mini
      api_key: os.environ/XAI_API_KEY

  # ── DeepSeek ───────────────────────────────────────────────────
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

  # ── Perplexity ─────────────────────────────────────────────────
  - model_name: perplexity-sonar
    litellm_params:
      model: perplexity/sonar
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-pro
    litellm_params:
      model: perplexity/sonar-pro
      api_key: os.environ/PERPLEXITY_API_KEY

  # ── OpenRouter (fallback to any model) ─────────────────────────
  - model_name: openrouter/auto
    litellm_params:
      model: openrouter/auto
      api_key: os.environ/OPENROUTER_API_KEY

  # ── Moonshot / Kimi ────────────────────────────────────────────
  - model_name: moonshot-v1
    litellm_params:
      model: moonshot/moonshot-v1-128k
      api_key: os.environ/MOONSHOT_API_KEY

  # ── Alibaba / Qwen ────────────────────────────────────────────
  - model_name: qwen-max
    litellm_params:
      model: dashscope/qwen-max
      api_key: os.environ/DASHSCOPE_API_KEY

  # ── Mistral ────────────────────────────────────────────────────
  - model_name: mistral-large-latest
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral-small-latest
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: codestral-latest
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  # ── MiniMax ────────────────────────────────────────────────────
  - model_name: minimax-01
    litellm_params:
      model: openai/abab6.5s-chat
      api_base: https://api.minimaxi.chat/v1
      api_key: os.environ/MINIMAX_API_KEY

  - model_name: minimax-2.7
    litellm_params:
      model: openai/MiniMax-Text-01
      api_base: https://api.minimaxi.chat/v1
      api_key: os.environ/MINIMAX_API_KEY

  # ── GLM / Zhipu ────────────────────────────────────────────────
  - model_name: glm-4-plus
    litellm_params:
      model: openai/glm-4-plus
      api_base: https://open.bigmodel.cn/api/paas/v4
      api_key: os.environ/ZHIPU_API_KEY

  - model_name: glm-5
    litellm_params:
      model: openai/glm-5
      api_base: https://open.bigmodel.cn/api/paas/v4
      api_key: os.environ/ZHIPU_API_KEY

  # ── Tavily (search — not LLM, but here for completeness) ───────
  # Tavily is consumed by Waggle search routes, not LiteLLM.

litellm_settings:
  drop_params: true
  request_timeout: 120
