  # ── Added for PromptAssembler eval (v4) ────────────────────────
  # Spec: docs/specs/PROMPT-ASSEMBLER-V4.md §11.2

  # Claude Opus 4.7 — native Anthropic. Released 16 April 2026.
  # NOTE: 20260416 date suffix assumed per brief §11.2. If Anthropic's
