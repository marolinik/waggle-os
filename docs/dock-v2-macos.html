<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waggle AI — macOS Dock Concept v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#090909;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--bg5:#2a2a2a;
  --gold:#c9a84c;--gold-dim:#8a7235;--gold-glow:rgba(201,168,76,.15);
  --gold-glow2:rgba(201,168,76,.25);
  --t1:#e8e8e8;--t2:#999;--t3:#666;--t4:#444;
  --border:#2a2a2a;--border2:#333;
  --green:#4aff8a;--red:#ff4a6a;--blue:#4a9eff;--purple:#a855f7;--orange:#ff8a4a;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);overflow:hidden;height:100vh;width:100vw;user-select:none;}
</style>
</head>
<body></body>
</html><style>
/* === TIER SELECTOR (floating top-right, concept UI only) === */
.tier-bar{position:fixed;top:12px;right:16px;z-index:9999;display:flex;gap:6px;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:10px;padding:4px;}
.tier-bar button{padding:6px 14px;border:none;border-radius:7px;background:transparent;color:var(--t3);font:500 11px/1 'Inter';cursor:pointer;transition:all .2s;}
.tier-bar button:hover{color:var(--t2);}
.tier-bar button.active{background:var(--gold-glow);color:var(--gold);box-shadow:0 0 12px var(--gold-glow);}
.tier-bar .label{font-size:9px;color:var(--t4);margin-right:8px;align-self:center;}

/* === STATUS BAR (top) === */
.statusbar{position:fixed;top:0;left:0;right:0;height:28px;background:rgba(10,10,10,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;z-index:100;font-size:11px;}
.statusbar .left{display:flex;align-items:center;gap:12px;}
.statusbar .left .logo{font-weight:700;color:var(--gold);letter-spacing:1px;font-size:12px;}
.statusbar .left span{color:var(--t3);}
.statusbar .right{margin-left:auto;display:flex;align-items:center;gap:14px;color:var(--t3);}
.statusbar .right .model{color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;background:var(--bg3);border-radius:4px;}

/* === DESKTOP === */
.desktop{position:fixed;top:28px;left:0;right:0;bottom:0;overflow:hidden;}
.desktop-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(201,168,76,.04) 0%,transparent 60%),var(--bg);}
.honeycomb{position:absolute;inset:0;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg width='60' height='52' viewBox='0 0 60 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 15v22L30 52 0 37V15z' fill='none' stroke='%23c9a84c' stroke-width='.8'/%3E%3C/svg%3E");background-size:60px 52px;}
</style><style>
/* === HERO (when no windows open) === */
.hero{position:absolute;top:0;left:0;right:0;bottom:80px;display:flex;flex-direction:column;align-items:center;padding-top:6vh;pointer-events:none;transition:opacity .4s;}
.hero.hidden{opacity:0;}
.hero-logo{width:100px;height:100px;border-radius:20px;background:radial-gradient(circle,rgba(201,168,76,.2),transparent 70%);display:flex;align-items:center;justify-content:center;font-size:56px;margin-bottom:16px;box-shadow:0 0 60px rgba(201,168,76,.15);}
.hero h1{font-size:52px;font-weight:700;letter-spacing:.08em;color:rgba(232,232,232,.95);text-shadow:0 0 40px rgba(201,168,76,.15),0 2px 4px rgba(0,0,0,.8);}
.hero .subtitle{font-size:13px;font-weight:400;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-dim);margin-top:6px;text-shadow:0 1px 4px rgba(0,0,0,.8);}
.hero .divider{width:60px;height:1px;margin-top:14px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.3),transparent);}
.hero .hint{margin-top:auto;margin-bottom:24px;font-size:12px;color:var(--t4);letter-spacing:.05em;animation:pulse 4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.7}}

/* === DOCK (macOS bottom style) === */
.dock-wrap{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:200;transition:all .3s;}
.dock{display:flex;align-items:flex-end;gap:2px;padding:6px 10px;background:rgba(20,20,20,.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.dock-zone-sep{width:1px;height:28px;background:rgba(255,255,255,.06);margin:0 4px;align-self:center;}
.dock-item{position:relative;display:flex;flex-direction:column;align-items:center;padding:6px 8px;border-radius:12px;cursor:pointer;transition:all .15s ease;}
.dock-item:hover{transform:translateY(-6px) scale(1.15);}
.dock-item:active{transform:translateY(-2px) scale(1.05);}
.dock-item .icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;}
.dock-item .lbl{font-size:0;opacity:0;transition:all .15s;white-space:nowrap;color:var(--t1);margin-top:2px;position:absolute;top:-24px;background:var(--bg4);padding:2px 8px;border-radius:5px;font-size:10px;pointer-events:none;}
.dock-item:hover .lbl{opacity:1;}
.dock-item .dot{width:4px;height:4px;border-radius:50%;background:var(--gold);margin-top:3px;opacity:0;transition:opacity .2s;}
.dock-item.open .dot{opacity:1;}
.dock-item.hidden-tier{display:none;}
</style><style>
/* === DOCK ZONE COLORS === */
.dock-item[data-zone="home"] .icon{background:rgba(74,158,255,.12);color:var(--blue);}
.dock-item[data-zone="work"] .icon{background:rgba(201,168,76,.12);color:var(--gold);}
.dock-item[data-zone="work-chat"] .icon{background:rgba(201,168,76,.12);color:var(--gold);}
.dock-item[data-zone="work-agents"] .icon{background:rgba(255,138,74,.12);color:var(--orange);}
.dock-item[data-zone="work-files"] .icon{background:rgba(201,168,76,.1);color:#d4a84a;}
.dock-item[data-zone="work-dance"] .icon{background:rgba(255,200,50,.1);color:#e8b830;}
.dock-item[data-zone="work-terminal"] .icon{background:rgba(74,255,138,.08);color:var(--green);}
.dock-item[data-zone="work-voice"] .icon{background:rgba(168,85,247,.1);color:var(--purple);}
.dock-item[data-zone="ops"] .icon{background:rgba(74,255,138,.1);color:var(--green);}
.dock-item[data-zone="ops-cmd"] .icon{background:rgba(74,255,138,.1);color:var(--green);}
.dock-item[data-zone="ops-events"] .icon{background:rgba(0,200,200,.1);color:#4ad8d8;}
.dock-item[data-zone="ops-jobs"] .icon{background:rgba(255,200,50,.1);color:#e8c840;}
.dock-item[data-zone="extend"] .icon{background:rgba(168,85,247,.12);color:var(--purple);}
.dock-item[data-zone="extend-skills"] .icon{background:rgba(168,85,247,.1);color:var(--purple);}
.dock-item[data-zone="extend-connectors"] .icon{background:rgba(74,255,138,.1);color:var(--green);}
.dock-item[data-zone="extend-market"] .icon{background:rgba(255,138,74,.1);color:var(--orange);}
.dock-item[data-zone="system"] .icon{background:rgba(255,255,255,.06);color:var(--t2);}
.dock-item[data-zone="system-mem"] .icon{background:rgba(201,168,76,.1);color:var(--gold);}
.dock-item[data-zone="system-vault"] .icon{background:rgba(201,168,76,.08);color:var(--gold-dim);}
.dock-item[data-zone="system-profile"] .icon{background:rgba(74,158,255,.08);color:var(--blue);}

/* Expanded zone indicator */
.dock-item.zone-parent{position:relative;}
.dock-item.zone-parent.expanded .icon{box-shadow:0 0 12px var(--gold-glow2);border:1px solid rgba(201,168,76,.2);}
</style><style>
/* === ZONE TRAY (expands above dock on zone click) === */
.zone-tray{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:199;display:none;flex-direction:row;gap:3px;padding:8px 12px;background:rgba(20,20,20,.85);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:trayIn .2s ease;}
.zone-tray.open{display:flex;}
@keyframes trayIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.zone-tray .tray-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 14px;border-radius:10px;cursor:pointer;transition:all .15s;min-width:64px;}
.zone-tray .tray-item:hover{background:rgba(255,255,255,.06);}
.zone-tray .tray-item .ti-icon{font-size:20px;}
.zone-tray .tray-item .ti-label{font-size:10px;color:var(--t3);white-space:nowrap;}
.zone-tray .tray-item:hover .ti-label{color:var(--t1);}
.zone-tray .tray-item .ti-badge{font-size:8px;padding:1px 5px;border-radius:8px;background:var(--gold-glow);color:var(--gold);margin-top:-2px;}

/* === WINDOWS === */
.window{position:absolute;background:rgba(18,18,18,.92);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.5);display:flex;flex-direction:column;transition:box-shadow .2s;}
.window.focused{box-shadow:0 16px 50px rgba(0,0,0,.7);border-color:var(--border2);}
.window .titlebar{height:36px;display:flex;align-items:center;padding:0 12px;gap:8px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);cursor:grab;flex-shrink:0;}
.window .titlebar .dots{display:flex;gap:6px;}
.window .titlebar .dots span{width:10px;height:10px;border-radius:50%;cursor:pointer;}
.window .titlebar .dots .close{background:#ff5f57;}
.window .titlebar .dots .min{background:#febc2e;}
.window .titlebar .dots .max{background:#28c840;}
.window .titlebar .title{flex:1;text-align:center;font-size:12px;color:var(--t2);font-weight:500;}
.window .titlebar .title .workspace-tag{font-size:9px;color:var(--gold-dim);margin-left:6px;padding:1px 6px;background:var(--gold-glow);border-radius:4px;}
.window .win-body{flex:1;overflow-y:auto;padding:16px;}
</style><style>
/* === CHAT MOCK inside window === */
.chat-mock{display:flex;flex-direction:column;height:100%;gap:12px;}
.chat-mock .ws-banner{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-radius:8px;margin-bottom:8px;}
.ws-banner .ws-icon{font-size:18px;}
.ws-banner .ws-info h4{font-size:12px;color:var(--t1);font-weight:600;}
.ws-banner .ws-info p{font-size:10px;color:var(--t3);}
.chat-mock .messages{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.msg{padding:10px 14px;border-radius:10px;font-size:12px;line-height:1.5;max-width:85%;}
.msg.user{background:var(--gold-glow);color:var(--t1);align-self:flex-end;border-bottom-right-radius:4px;}
.msg.ai{background:var(--bg3);color:var(--t2);align-self:flex-start;border-bottom-left-radius:4px;}
.chat-mock .input-bar{display:flex;gap:8px;padding:8px;background:var(--bg3);border-radius:10px;margin-top:auto;}
.chat-mock .input-bar input{flex:1;background:none;border:none;color:var(--t1);font:13px/1 'Inter';outline:none;}
.chat-mock .input-bar button{padding:6px 12px;background:var(--gold);color:var(--bg);border:none;border-radius:7px;font:600 11px/1 'Inter';cursor:pointer;}

/* === COMMAND PALETTE (AI-powered) === */
.cmd-overlay{position:fixed;inset:0;z-index:10000;display:none;align-items:flex-start;justify-content:center;padding-top:12vh;}
.cmd-overlay.open{display:flex;}
.cmd-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);}
.cmd-modal{position:relative;width:580px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6);}
.cmd-top{display:flex;align-items:center;padding:14px 18px;gap:10px;border-bottom:1px solid var(--border);}
.cmd-top .ai-badge{padding:3px 8px;background:var(--gold-glow);border:1px solid rgba(201,168,76,.2);border-radius:6px;font-size:9px;font-weight:600;color:var(--gold);letter-spacing:.5px;}
.cmd-top input{flex:1;background:none;border:none;color:var(--t1);font:15px/1 'Inter';outline:none;}
.cmd-top input::placeholder{color:var(--t4);}
.cmd-top kbd{padding:2px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;font:11px/1 'JetBrains Mono';color:var(--t3);}
.cmd-results{padding:6px;max-height:380px;overflow-y:auto;}
.cmd-group{padding:6px 12px 4px;font:600 9px/1 'Inter';color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.cmd-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:background .12s;}
.cmd-item:hover,.cmd-item.sel{background:var(--gold-glow);}
.cmd-item .ci-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0;}
.cmd-item .ci-text{flex:1;}
.cmd-item .ci-text .ci-title{font-size:13px;color:var(--t1);}
.cmd-item .ci-text .ci-sub{font-size:10px;color:var(--t4);margin-top:1px;}
.cmd-item .ci-hint{font-size:10px;color:var(--t4);}
.cmd-item .ci-ai{font-size:9px;padding:2px 6px;background:rgba(168,85,247,.15);color:var(--purple);border-radius:4px;font-weight:600;}
.cmd-footer{display:flex;align-items:center;gap:14px;padding:8px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--t4);}
.cmd-footer kbd{padding:1px 5px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;font:10px/1 'JetBrains Mono';}
.cmd-footer .ai-note{margin-left:auto;color:var(--purple);font-size:9px;display:flex;align-items:center;gap:4px;}
</style>
<!-- TIER SELECTOR (concept UI) -->
<div class="tier-bar">
  <span class="label">TIER:</span>
  <button class="active" onclick="setTier('simple',this)">Simple</button>

<div class="statusbar">

  <!-- HERO -->

</div>

<!-- COMMAND PALETTE -->
<div class="cmd-overlay" id="cmd-overlay">
  <div class="cmd-backdrop" onclick="closeCmd()"></div>
  <div class="cmd-modal">
    <div class="cmd-top">
      <span class="ai-badge">&#x2728; AI</span>

      <span class="ai-note">&#x2728; AI understands natural language</span>
    </div>
  </div>
</div>
<script>
// === DATA MODEL ===
const TIERS = {
  simple:      { dockZones: ['home','work-chat','work-files','system'], showTray: false },
  pro:         { dockZones: ['home','work-chat','work-agents','work-files','system'], showTray: false },
  power:       { dockZones: ['home','SEP','work-chat','work-agents','work-files','work-dance','work-terminal','SEP','ops','extend','SEP','system'], showTray: true },

};

const DOCK_ITEMS = {
  'home':              { icon:'\u{1F3E0}', label:'Home',          zone:'home',    app:'dashboard' },
  'work-chat':         { icon:'\u{1F4AC}', label:'Chat',          zone:'work',    app:'chat' },

  'work-files':        { icon:'\u{1F4C1}', label:'Files',         zone:'work',    app:'files' },
  'work-dance':        { icon:'\u26A1',    label:'Waggle Dance',  zone:'work',    app:'waggle-dance' },
  'work-terminal':     { icon:'\u{1F4BB}', label:'Terminal',      zone:'work',    app:'terminal' },
  'work-voice':        { icon:'\u{1F399}', label:'Voice',         zone:'work',    app:'voice' },
  'ops':               { icon:'\u{1F4CA}', label:'Ops',           zone:'ops',     isParent:true, trayItems:['ops-cmd','ops-events','ops-jobs'] },
  'ops-cmd':           { icon:'\u{1F3AF}', label:'Command Center',zone:'ops',     app:'cockpit' },
  'ops-events':        { icon:'\u{1F4CB}', label:'Events & Logs', zone:'ops',     app:'events' },

  'system-profile':    { icon:'\u{1F464}', label:'Profile',       zone:'system',  app:'profile' },
};
</script><script>
// === WINDOW CONTENT TEMPLATES ===
const WIN_CONFIG = {

// === STATE ===
let currentTier = 'simple';
let openWindows = [];
let topZ = 10;
let expandedZone = null;

// === DOCK RENDERING ===
function renderDock() {
  const dock = document.getElementById('dock');
  const tier = TIERS[currentTier];
  let html = '';
  tier.dockZones.forEach(key => {
    if (key === 'SEP') { html += '<div class="dock-zone-sep"></div>'; return; }
    const item = DOCK_ITEMS[key];
    if (!item) return;
    const isOpen = openWindows.some(w => w.app === item.app);
    const isParent = item.isParent ? ' zone-parent' : '';
    const expanded = expandedZone === key ? ' expanded' : '';
    html += '<div class="dock-item' + isParent + expanded + (isOpen ? ' open' : '') + '" data-zone="' + key + '" onclick="onDockClick(\'' + key + '\')">';
    html += '<span class="lbl">' + item.label + '</span>';
    html += '<div class="icon">' + item.icon + '</div>';
    html += '<div class="dot"></div>';
    html += '</div>';
  });
  dock.innerHTML = html;
}

// === DOCK CLICK ===
function onDockClick(key) {
  const item = DOCK_ITEMS[key];
  if (!item) return;
  
  if (item.isParent) {
    // Toggle zone tray
    if (expandedZone === key) { closeTray(); return; }
    expandedZone = key;
    renderDock();
    showTray(item.trayItems);
    return;
  }
  
  closeTray();
  openApp(item.app);
}

// === ZONE TRAY ===
function showTray(items) {
  const tray = document.getElementById('zone-tray');
  let html = '';
  items.forEach(key => {
    const item = DOCK_ITEMS[key];
    if (!item) return;
    let badge = item.badge ? '<div class="ti-badge">' + item.badge + '</div>' : '';
    html += '<div class="tray-item" onclick="onTrayClick(\'' + key + '\')">';
    html += '<div class="ti-icon">' + item.icon + '</div>';
    html += '<div class="ti-label">' + item.label + '</div>';
    html += badge;
    html += '</div>';
  });
  tray.innerHTML = html;
  tray.classList.add('open');
}

function closeTray() {
  expandedZone = null;
  document.getElementById('zone-tray').classList.remove('open');
  renderDock();
}

function onTrayClick(key) {
  const item = DOCK_ITEMS[key];
  if (!item) return;
  closeTray();
  openApp(item.app);
}
</script><script>
// === WINDOW MANAGEMENT ===
function openApp(appId) {
  // Singleton: if already open, focus it
  const existing = openWindows.find(w => w.app === appId);
  if (existing) { focusWindow(existing.id); return; }
  
  const config = WIN_CONFIG[appId];
  if (!config) return;
  
  const id = 'win-' + Date.now();
  const offset = openWindows.length * 28;
  const x = 120 + offset + Math.random() * 40;
  const y = 60 + offset + Math.random() * 20;
  
  openWindows.push({ id, app: appId, x, y, z: ++topZ });
  
  const container = document.getElementById('windows');
  const win = document.createElement('div');
  win.className = 'window focused';
  win.id = id;
  win.style.cssText = 'left:' + x + 'px;top:' + y + 'px;width:' + config.w + 'px;height:' + config.h + 'px;z-index:' + topZ + ';';
  
  // Title with workspace tag for chat/files
  let titleExtra = '';
  if (appId === 'chat' || appId === 'files') {
    titleExtra = '<span class="workspace-tag">Banking Credit Analysis</span>';
  }
  
  let bodyContent = '';
  if (config.isChat) {
    bodyContent = buildChatContent();
  } else {
    bodyContent = config.content || '<div style="padding:20px;color:var(--t3)">Coming soon...</div>';
  }
  
  win.innerHTML = '<div class="titlebar" onmousedown="startDrag(event,\'' + id + '\')">' +
    '<div class="dots"><span class="close" onclick="closeWindow(\'' + id + '\')"></span><span class="min" onclick="minimizeWindow(\'' + id + '\')"></span><span class="max"></span></div>' +
    '<div class="title">' + config.title + titleExtra + '</div></div>' +
    '<div class="win-body">' + bodyContent + '</div>';
  
  win.addEventListener('mousedown', () => focusWindow(id));
  container.appendChild(win);
  
  document.getElementById('hero').classList.add('hidden');
  renderDock();
}

function closeWindow(id) {

  if (openWindows.length === 0) document.getElementById('hero').classList.remove('hidden');
  renderDock();
}

function minimizeWindow(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

function focusWindow(id) {
  document.querySelectorAll('.window').forEach(w => w.classList.remove('focused'));
  const el = document.getElementById(id);
  if (el) { el.style.zIndex = ++topZ; el.classList.add('focused'); el.style.display = 'flex'; }
}

// === DRAG ===
let dragState = null;
function startDrag(e, id) {
  if (e.target.closest('.dots')) return;
  const el = document.getElementById(id);
  dragState = { id, el, startX: e.clientX - el.offsetLeft, startY: e.clientY - el.offsetTop };
  focusWindow(id);
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', () => { dragState = null; document.removeEventListener('mousemove', onDrag); });
}
function onDrag(e) {
  if (!dragState) return;
  dragState.el.style.left = (e.clientX - dragState.startX) + 'px';
  dragState.el.style.top = (e.clientY - dragState.startY) + 'px';
}

    let groupItems = group.items.filter(i => !q || i.title.toLowerCase().includes(q) || (i.sub && i.sub.toLowerCase().includes(q)));
    if (groupItems.length === 0) return;
    html += '<div class="cmd-group">' + group.group + '</div>';
    groupItems.forEach((item, idx) => {
      const sel = (!q && group === CMD_ITEMS[0] && idx === 0) ? ' sel' : '';
      html += '<div class="cmd-item' + sel + '">';
      html += '<div class="ci-icon">' + item.icon + '</div>';
      html += '<div class="ci-text"><div class="ci-title">' + item.title + '</div>';
      if (item.sub) html += '<div class="ci-sub">' + item.sub + '</div>';
      html += '</div>';
      if (item.ai) html += '<span class="ci-ai">\u2728 AI</span>';
      else if (item.hint) html += '<span class="ci-hint">' + item.hint + '</span>';
      html += '</div>';
    });
  });
  
  // If query looks like natural language, show AI interpretation
  if (q && q.length > 8) {
    html += '<div class="cmd-group">AI Interpretation</div>';
    html += '<div class="cmd-item sel"><div class="ci-icon">\u2728</div><div class="ci-text"><div class="ci-title">"' + filter + '"</div><div class="ci-sub">AI will interpret and route this request</div></div><span class="ci-ai">\u2728 AI</span></div>';
  }
  
  container.innerHTML = html;
}

function openCmd() {
  document.getElementById('cmd-overlay').classList.add('open');
  const input = document.getElementById('cmd-input');
  input.value = '';
  renderCmdResults('');
  setTimeout(() => input.focus(), 50);
}
function closeCmd() { document.getElementById('cmd-overlay').classList.remove('open'); }
function onCmdInput(val) { renderCmdResults(val); }

// Keyboard
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openCmd(); }
  if (e.key === 'Escape') { closeCmd(); closeTray(); }
});

// Clock
function updateClock() {
  const d = new Date();
  const t = d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  const dt = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  document.getElementById('sb-time').textContent = dt + '  ' + t;
}
setInterval(updateClock, 1000); updateClock();

// === INIT ===
renderDock();
</script>
