# ── Abort triggers ────────────────────────────────────────────────────────
abort_triggers:
  - name: budget_burn_exceeds_130pct
    threshold_usd: 325
    mid_run: true
  - name: fleiss_kappa_drop_below_threshold
    kappa_min: 0.60
    kappa_drop_from_sprint10_baseline_pp: 10
    sprint10_baseline: 0.7458
    mid_run: true
    mid_run_cell_threshold: 100
  - name: litellm_health_flips_unhealthy
    check: "curl -sf localhost:4000/health/liveliness"
    mid_run: true
  - name: network_error_streak_target_model
    streak_count: 3
    mid_run: true
  - name: reasoning_content_shape_unknown_drift
    threshold: 2
    mid_run: true
  - name: manifest_hash_mismatch
    mid_run: true
    semantic: "Emitted bench.preregistration.manifest_hash event != committed YAML hash"
  - name: resolveTieBreak_throws_or_undefined
    mid_run: true
    semantic: "B2 LOCK live-verification would fail; forensic preserve JSONL"

