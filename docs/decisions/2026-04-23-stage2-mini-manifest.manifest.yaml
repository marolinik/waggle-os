failure_taxonomy_codes_module: benchmarks/harness/src/failure-taxonomy/codes.ts
failure_taxonomy_aggregate_module: benchmarks/harness/src/failure-taxonomy/aggregate.ts
failure_taxonomy_validator_module: benchmarks/harness/src/failure-taxonomy/validator.ts
failure_taxonomy_f_other_review_threshold: 0.10
failure_taxonomy_f_other_threshold_semantic: strict_greater_than

# ── Field 15: budget ──────────────────────────────────────────────────────
budget_target_usd_min: 110
budget_target_usd_max: 185
budget_cap_usd: 250
budget_abort_threshold_usd: 325
budget_abort_pct_of_cap: 130

# ── Field 16: retention ───────────────────────────────────────────────────
retention_policy: A2-Q5-tier-2-full-preserved
retention_horizon_floor_months: 12
retention_horizon_active_claim: indefinite_plus_24mo_post_decommissioning
retention_archive_layout_ref: 2026-04-22-bench-spec-locked.md#section-9

