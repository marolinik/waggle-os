# C3 Stage 2 Mini Per-Run Manifest v1 — machine-readable twin
# Canonical markdown surface: 2026-04-23-stage2-mini-manifest.md
# Parent bench-spec lock: 2026-04-22-bench-spec-locked.manifest.yaml
# Sync guard: scripts/check-manifest-sync.mjs (authorized, pending implementation)
# Any change to this file requires new markdown decision doc + PM ratification
# and a new hash binding (old runs' --manifest-hash binding becomes invalid).

manifest_version: v1.0.0
manifest_type: per_run_mini
inherits_from_parent: decisions/2026-04-22-bench-spec-locked.manifest.yaml
parent_manifest_hash_reference: (computed separately by runner via resolveManifestPath)
locked_date: 2026-04-23
authority: "PM (Marko Marković) — v2 brief 2026-04-23 ratification, §2 pre-kick trio CLOSED, §3.5 direct-provider audit CLOSED"
sprint: 12
track: A
task: 2
run_stage: mini

# ── Field 5/6: target (subject) model ─────────────────────────────────────
target_model: qwen3.6-35b-a3b-via-openrouter
target_model_thinking_mode: on
target_model_max_tokens: 64000
target_model_routing:
  litellm_alias: qwen3.6-35b-a3b-via-openrouter
  upstream_provider: openrouter_bridge
  upstream_slug: openrouter/qwen/qwen3.5-35b-a3b
  routing_path: "LiteLLM (localhost:4000) -> OpenRouter -> Alibaba inference"
  bridge_reason: "DashScope direct blocked 2026-04-21; OpenRouter is only live path for the canonical LOCKED subject-model entry. Stage 2 Day-1 OVERRIDE 2026-04-22 retained thinking=on + max_tokens=64000."

# ── Field 7: primary judge ensemble — DIRECT routing (updated v2 2026-04-23) ─
# Architecture pivot per brief v2 §3.5: judges use LiteLLM direct upstream APIs,
# not OpenRouter bridge. Eliminates ~5-15% OpenRouter middleware markup + preserves
# native token-level telemetry (Gemini reasoning_tokens, etc.) for EU AI Act Art. 14
# replay integrity.
judge_primary:
  - id: claude-opus-4-7
    litellm_alias: claude-opus-4-7
    upstream_provider: anthropic_direct
    upstream_slug: anthropic/claude-opus-4-7
    routing_path: "LiteLLM -> Anthropic Messages API direct"
    api_key_env: ANTHROPIC_API_KEY
    pinning_surface: anthropic_immutable
    pinning_surface_carve_out_reason: null
    smoke_verified_at: 2026-04-23T02:34:00Z

  - id: gpt-5.4
    litellm_alias: gpt-5.4
    upstream_provider: openai_direct
    upstream_slug: openai/gpt-5.4
    routing_path: "LiteLLM -> OpenAI Chat Completions API direct"
    api_key_env: OPENAI_API_KEY
    pinning_surface: floating_alias
    pinning_surface_carve_out_reason: "OpenAI does not expose immutable model snapshots for the gpt-5.x family via OpenAI Chat Completions surface. Floating alias mandated by B3 addendum § 5."
    smoke_verified_at: 2026-04-23T02:34:30Z

  - id: gemini-3.1-pro
    litellm_alias: gemini-3.1-pro
    upstream_provider: google_ai_studio_direct
    upstream_slug: gemini/gemini-3.1-pro-preview
    routing_path: "LiteLLM -> Google AI Studio direct (v1beta models endpoint)"
    api_key_env: GEMINI_API_KEY
    pinning_surface: floating_alias
    pinning_surface_carve_out_reason: "Gemini 3.1 Pro canonical release ships as `gemini/gemini-3.1-pro-preview` only — no stable variant as of 2026-04-23 01:47 UTC (verified via OpenRouter /api/v1/models probe AND Google AI Studio direct smoke at 02:35:00Z). Google guarantees `-preview` alias stability within a release window but not across release cycles. Replay-time verification required. Floating alias mandated by B3 addendum § 5."
    smoke_verified_at: 2026-04-23T02:35:00Z
    pinning_note_extended: >
      Direct Google AI Studio routing surfaces native `reasoning_tokens`
      telemetry under `completion_tokens_details` in the response usage
      field (observed during §3.5 smoke: 27 reasoning_tokens + 1 text_token
      for a trivial ping at max_tokens=8). Judge-client default
      max_tokens=1024 leaves ample headroom for the judge-response JSON
      even with reasoning mode active.

# ── Field 8: tie-break reserve ────────────────────────────────────────────
judge_tiebreak:
  id: grok-4.20
  litellm_alias: grok-4.20
  upstream_provider: xai_direct
  upstream_slug: xai/grok-4.20
  routing_path: "LiteLLM -> xAI API direct"
  api_key_env: XAI_API_KEY
  harness_audit_key: grok-4.20
  runner_audit_slug: x-ai/grok-4.20
  pinning_surface: floating_alias
  pinning_surface_carve_out_reason: "xAI does not expose immutable model snapshots for the grok-4.20 family. Floating alias mandated by B3 addendum § 5."
  smoke_verified_at: 2026-04-23T02:35:30Z
  activation_rule: "resolveTieBreak fires on 3-primary 1-1-1 vote split (expected rate ~2-5% → ~8-20 fires across 400 evaluations). 1-1-1-1 four-way → pm-escalation per B2 LOCK § 1."

# ── Field 9: judge rubric ─────────────────────────────────────────────────
judge_rubric_path: packages/server/src/benchmarks/judge/failure-mode-judge.ts
judge_rubric_version_in_use: sprint9_5value_F1_to_F5
a3_rubric_available: true
a3_rubric_builder: benchmarks/harness/src/failure-taxonomy/rubric.ts::buildJudgeRubricBlock
a3_rubric_splice_status: deferred_to_task2_phase2
a3_rubric_effective_on_this_run: false

# ── Field 10: dataset ─────────────────────────────────────────────────────
