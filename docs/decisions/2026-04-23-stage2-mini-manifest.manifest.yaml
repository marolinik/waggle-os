dataset_version_hash_source: benchmarks/harness/src/datasets.ts::getDatasetVersion
dataset_canonical_path: benchmarks/data/locomo/release-bundle.tar.gz
dataset_instance_count_total: 1531

# ── Field 11: instance count ──────────────────────────────────────────────
instance_count:
  per_cell: 100
  total: 400
  cells: 4

# ── Field 12: cells ───────────────────────────────────────────────────────
cells:
  - name: raw
    parameters:
      memory_retrieval: false
      prompt_evolution: false
  - name: filtered
    parameters:
      memory_retrieval: true
      prompt_evolution: false
  - name: compressed
    parameters:
      memory_retrieval: false
      prompt_evolution: true
  - name: full-context
    parameters:
      memory_retrieval: true
      prompt_evolution: true

# ── Field 13: CI method ───────────────────────────────────────────────────
ci_method:
  wilson_95: true
  cluster_bootstrap_95: true
  bootstrap_iterations: 10000
  bootstrap_seed: 42
  cluster_unit: conversation_id

# ── Field 14: failure taxonomy ────────────────────────────────────────────
